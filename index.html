<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Exhibit A" />
  <title>Exhibit A</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fafaf7; font-family: Georgia, serif; }
    input, select, button { font-family: Georgia, serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ---- FIREBASE CONFIG ----
    const firebaseConfig = {
      apiKey: "AIzaSyDEv6q7QvI7bz5fqAxpbn7oGvksoC7a6a0",
      authDomain: "exhibit-a-ef081.firebaseapp.com",
      projectId: "exhibit-a-ef081",
      storageBucket: "exhibit-a-ef081.firebasestorage.app",
      messagingSenderId: "388796153041",
      appId: "1:388796153041:web:60c874a7ccf2066cb2d9f0"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ---- APP ----
    const PARENTS = {
      dad: { name: "Dad", emoji: "👨", color: "#e85d04", light: "#fff3eb" },
      mom: { name: "Mom", emoji: "👩", color: "#7b2d8b", light: "#f9f0fb" },
    };

    const CATEGORIES = ["Chores", "Homework", "Bedtime", "Screen Time", "Food", "Other"];

    function getStreak(log) {
      if (!log.length) return { current: 0, best: 0 };
      const incidentDates = new Set(log.map(e => e.isoDate).filter(Boolean));
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      let current = 0;
      let d = new Date(today);
      while (true) {
        const key = d.toISOString().split("T")[0];
        if (incidentDates.has(key)) break;
        current++;
        if (current > 365) break;
        d.setDate(d.getDate() - 1);
      }
      const sortedDates = [...incidentDates].map(s => new Date(s)).sort((a, b) => a - b);
      let best = current;
      for (let i = 1; i < sortedDates.length; i++) {
        const gap = Math.round((sortedDates[i] - sortedDates[i-1]) / 86400000) - 1;
        if (gap > best) best = gap;
      }
      return { current, best };
    }

    function App() {
      const [log, setLog] = useState([]);
      const [loading, setLoading] = useState(true);
      const [form, setForm] = useState({ parent: "dad", task: "", category: "Chores" });
      const [showLog, setShowLog] = useState(false);
      const [showKid, setShowKid] = useState(false);
      const [adding, setAdding] = useState(false);

      useEffect(() => {
        const unsubscribe = db.collection("incidents")
          .orderBy("createdAt", "desc")
          .onSnapshot(snapshot => {
            setLog(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
            setLoading(false);
          });
        return () => unsubscribe();
      }, []);

      const dadCount = log.filter(e => e.parent === "dad").length;
      const momCount = log.filter(e => e.parent === "mom").length;
      const total = log.length;
      const { current: streak, best: bestStreak } = getStreak(log);

      const topIgnored = (() => {
        if (!log.length) return null;
        const counts = {};
        log.forEach(e => { counts[e.task] = (counts[e.task] || 0) + 1; });
        return Object.entries(counts).sort((a, b) => b[1] - a[1])[0];
      })();

      const addEntry = async () => {
        if (!form.task.trim() || adding) return;
        setAdding(true);
        const now = new Date();
        try {
          await db.collection("incidents").add({
            parent: form.parent,
            task: form.task.trim(),
            category: form.category,
            time: now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }),
            date: now.toLocaleDateString(),
            isoDate: now.toISOString().split("T")[0],
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          });
          setForm(f => ({ ...f, task: "" }));
        } catch(e) { console.error(e); }
        setAdding(false);
      };

      const removeEntry = async (id) => {
        try { await db.collection("incidents").doc(id).delete(); }
        catch(e) { console.error(e); }
      };

      const streakColor = streak >= 7 ? "#16a34a" : streak >= 3 ? "#ca8a04" : "#dc2626";
      const streakEmoji = streak >= 7 ? "🔥" : streak >= 3 ? "⚡" : streak >= 1 ? "😬" : "💀";

      if (loading) return (
        <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", color:"#888" }}>
          <div style={{ textAlign:"center" }}>
            <div style={{ fontSize:36, marginBottom:12 }}>📋</div>
            <div>Loading Exhibit A...</div>
          </div>
        </div>
      );

      return (
        <div style={{ minHeight:"100vh", background:"#fafaf7" }}>

          {/* Header */}
          <div style={{ background:"#1a1a2e", padding:"28px 24px 20px", textAlign:"center", position:"relative", overflow:"hidden" }}>
            <div style={{ position:"absolute", top:0, left:0, right:0, bottom:0, background:"repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.02) 10px, rgba(255,255,255,0.02) 20px)" }} />
            <div style={{ fontSize:36, marginBottom:6 }}>📋</div>
            <h1 style={{ color:"#fff", margin:0, fontSize:22, fontWeight:"normal", letterSpacing:"0.04em" }}>Exhibit A</h1>
            <p style={{ color:"#9999bb", margin:"4px 0 0", fontSize:13, fontStyle:"italic" }}>"Things We Said That Were Ignored"</p>
            <div style={{ marginTop:8, fontSize:11, color:"#3a3a5c" }}>🔴 Live — synced between all devices</div>
          </div>

          {/* Streak */}
          <div style={{ maxWidth:480, margin:"0 auto", padding:"16px 20px 0" }}>
            <div style={{ background:"#fff", borderRadius:16, padding:"14px 20px", display:"flex", alignItems:"center", justifyContent:"space-between", boxShadow:"0 2px 12px rgba(0,0,0,0.06)", border:`2px solid ${streakColor}33` }}>
              <div>
                <div style={{ fontSize:11, color:"#aaa", textTransform:"uppercase", letterSpacing:"0.08em" }}>Good Behavior Streak</div>
                <div style={{ fontSize:13, color:"#888", marginTop:4 }}>
                  {streak === 0 ? "Streak broken — log the incident!" : streak === 1 ? "1 clean day so far..." : `${streak} days without an incident`}
                </div>
                {bestStreak > 0 && <div style={{ fontSize:11, color:"#aaa", marginTop:4 }}>🏅 Best ever: <strong style={{ color:"#666" }}>{bestStreak} day{bestStreak !== 1 ? "s" : ""}</strong></div>}
              </div>
              <div style={{ textAlign:"center", minWidth:56 }}>
                <div style={{ fontSize:32 }}>{streakEmoji}</div>
                <div style={{ fontSize:28, fontWeight:"bold", color:streakColor, lineHeight:1 }}>{streak}</div>
                <div style={{ fontSize:10, color:"#aaa" }}>days</div>
              </div>
            </div>
          </div>

          {/* Scoreboard */}
          <div style={{ display:"flex", gap:12, padding:"12px 20px 0", maxWidth:480, margin:"0 auto" }}>
            {Object.entries(PARENTS).map(([key, p]) => {
              const count = key === "dad" ? dadCount : momCount;
              const isLeader = total > 0 && count > 0 && count === Math.max(dadCount, momCount);
              return (
                <div key={key} style={{ flex:1, background:"#fff", border:`3px solid ${p.color}`, borderRadius:16, padding:"16px 12px", textAlign:"center", boxShadow:`0 4px 20px ${p.color}22`, position:"relative", overflow:"hidden" }}>
                  <div style={{ fontSize:32 }}>{p.emoji}</div>
                  <div style={{ fontSize:13, color:"#666", marginTop:4 }}>{p.name} ignored</div>
                  <div style={{ fontSize:48, fontWeight:"bold", color:p.color, lineHeight:1.1 }}>{count}</div>
                  <div style={{ fontSize:11, color:"#aaa" }}>time{count !== 1 ? "s" : ""}</div>
                  {isLeader && <div style={{ position:"absolute", top:8, right:8, background:p.color, color:"#fff", fontSize:9, padding:"2px 6px", borderRadius:20, fontFamily:"monospace", fontWeight:"bold" }}>MOST IGNORED</div>}
                </div>
              );
            })}
          </div>

          {/* Pills */}
          <div style={{ textAlign:"center", padding:"12px 20px 0" }}>
            <span style={{ display:"inline-block", background:"#1a1a2e", color:"#fff", fontSize:13, padding:"6px 20px", borderRadius:30, fontFamily:"monospace", letterSpacing:"0.05em" }}>
              {total === 0 ? "No incidents yet" : `${total} total incident${total !== 1 ? "s" : ""} logged`}
            </span>
          </div>
          {topIgnored && (
            <div style={{ textAlign:"center", padding:"8px 20px 0" }}>
              <span style={{ display:"inline-block", background:"#fff3eb", color:"#e85d04", fontSize:12, padding:"5px 16px", borderRadius:30, border:"1px solid #ffd5b0" }}>
                🏆 Most ignored: <strong>"{topIgnored[0]}"</strong> × {topIgnored[1]}
              </span>
            </div>
          )}

          {/* Form */}
          <div style={{ maxWidth:480, margin:"16px auto 0", padding:"0 20px" }}>
            <div style={{ background:"#fff", borderRadius:20, padding:20, boxShadow:"0 2px 20px rgba(0,0,0,0.07)" }}>
              <div style={{ fontSize:13, color:"#888", marginBottom:12, fontStyle:"italic" }}>Log a new incident:</div>
              <div style={{ display:"flex", gap:8, marginBottom:12 }}>
                {Object.entries(PARENTS).map(([key, p]) => (
                  <button key={key} onClick={() => setForm(f => ({ ...f, parent: key }))}
                    style={{ flex:1, padding:"10px", border:`2px solid ${form.parent === key ? p.color : "#e8e8e8"}`, borderRadius:12, background:form.parent === key ? p.light : "#fafafa", color:form.parent === key ? p.color : "#999", cursor:"pointer", fontSize:14, fontWeight:"bold", transition:"all 0.2s" }}>
                    {p.emoji} {p.name}
                  </button>
                ))}
              </div>
              <select value={form.category} onChange={e => setForm(f => ({ ...f, category: e.target.value }))}
                style={{ width:"100%", padding:"10px 12px", borderRadius:12, border:"2px solid #e8e8e8", fontSize:13, color:"#444", background:"#fafafa", marginBottom:10, cursor:"pointer" }}>
                {CATEGORIES.map(c => <option key={c}>{c}</option>)}
              </select>
              <div style={{ display:"flex", gap:8 }}>
                <input value={form.task} onChange={e => setForm(f => ({ ...f, task: e.target.value }))} onKeyDown={e => e.key === "Enter" && addEntry()}
                  placeholder="What was ignored? (e.g. Clean your room)"
                  style={{ flex:1, padding:"10px 14px", borderRadius:12, border:"2px solid #e8e8e8", fontSize:13, outline:"none", background:"#fafafa" }} />
                <button onClick={addEntry} disabled={adding}
                  style={{ padding:"10px 18px", background:adding ? "#888" : "#1a1a2e", color:"#fff", border:"none", borderRadius:12, cursor:adding ? "not-allowed" : "pointer", fontSize:18 }}>
                  {adding ? "..." : "+"}
                </button>
              </div>
            </div>
          </div>

          {/* Buttons */}
          <div style={{ maxWidth:480, margin:"12px auto 0", padding:"0 20px", display:"flex", gap:10 }}>
            <button onClick={() => setShowLog(!showLog)}
              style={{ flex:1, padding:"11px", background:"#fff", border:"2px solid #e8e8e8", borderRadius:12, cursor:"pointer", fontSize:13, color:"#555" }}>
              {showLog ? "Hide" : "Show"} Full Log ({log.length})
            </button>
            <button onClick={() => setShowKid(!showKid)}
              style={{ flex:1, padding:"11px", background:showKid ? "#1a1a2e" : "#fff", border:"2px solid #1a1a2e", borderRadius:12, cursor:"pointer", fontSize:13, color:showKid ? "#fff" : "#1a1a2e" }}>
              👧 Show Her
            </button>
          </div>

          {/* Kid View */}
          {showKid && (
            <div style={{ maxWidth:480, margin:"14px auto 0", padding:"0 20px" }}>
              <div style={{ background:"#1a1a2e", borderRadius:20, padding:24, textAlign:"center", border:"3px solid #e85d04" }}>
                <div style={{ fontSize:36, marginBottom:8 }}>👧</div>
                <div style={{ color:"#e85d04", fontSize:16, fontWeight:"bold", marginBottom:4 }}>Attention: You</div>
                <div style={{ color:"#9999bb", fontSize:13, marginBottom:20, fontStyle:"italic" }}>Here is what the data says:</div>
                {total === 0 ? (
                  <div style={{ color:"#4ade80", fontSize:18 }}>🎉 No incidents on record. Keep it up!</div>
                ) : (
                  <>
                    <div style={{ background:"rgba(255,255,255,0.05)", borderRadius:14, padding:16, marginBottom:12 }}>
                      <div style={{ color:"#fff", fontSize:42, fontWeight:"bold" }}>{total}</div>
                      <div style={{ color:"#9999bb", fontSize:13 }}>times you didn't listen</div>
                    </div>
                    <div style={{ display:"flex", gap:10, marginBottom:12 }}>
                      <div style={{ flex:1, background:"rgba(232,93,4,0.15)", borderRadius:12, padding:12 }}>
                        <div style={{ color:"#e85d04", fontSize:24, fontWeight:"bold" }}>{dadCount}</div>
                        <div style={{ color:"#888", fontSize:11 }}>from Dad</div>
                      </div>
                      <div style={{ flex:1, background:"rgba(123,45,139,0.15)", borderRadius:12, padding:12 }}>
                        <div style={{ color:"#c084d8", fontSize:24, fontWeight:"bold" }}>{momCount}</div>
                        <div style={{ color:"#888", fontSize:11 }}>from Mom</div>
                      </div>
                    </div>
                    <div style={{ background:`rgba(${streak >= 7 ? "22,163,74" : streak >= 3 ? "202,138,4" : "220,38,38"},0.15)`, borderRadius:12, padding:12, marginBottom:12 }}>
                      <div style={{ color:streakColor, fontSize:22, fontWeight:"bold" }}>{streakEmoji} {streak} day{streak !== 1 ? "s" : ""}</div>
                      <div style={{ color:"#888", fontSize:11 }}>current good behavior streak</div>
                      {bestStreak > 0 && <div style={{ color:"#666", fontSize:11, marginTop:4 }}>Best ever: {bestStreak} days</div>}
                    </div>
                    {topIgnored && (
                      <div style={{ background:"rgba(232,93,4,0.1)", borderRadius:12, padding:12, color:"#e85d04", fontSize:13 }}>
                        You've been asked to <strong>"{topIgnored[0]}"</strong> and ignored it <strong>{topIgnored[1]} time{topIgnored[1] !== 1 ? "s" : ""}</strong>.
                      </div>
                    )}
                  </>
                )}
              </div>
            </div>
          )}

          {/* Full Log */}
          {showLog && (
            <div style={{ maxWidth:480, margin:"14px auto 0", padding:"0 20px" }}>
              {log.length === 0 ? (
                <div style={{ textAlign:"center", color:"#aaa", fontStyle:"italic", padding:20 }}>No incidents logged yet.</div>
              ) : (
                <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                  {log.map(entry => {
                    const p = PARENTS[entry.parent];
                    return (
                      <div key={entry.id} style={{ background:"#fff", borderRadius:14, padding:"12px 16px", borderLeft:`4px solid ${p.color}`, boxShadow:"0 1px 8px rgba(0,0,0,0.05)", display:"flex", alignItems:"center", gap:12 }}>
                        <div style={{ fontSize:22 }}>{p.emoji}</div>
                        <div style={{ flex:1 }}>
                          <div style={{ fontSize:14, color:"#222", fontWeight:"bold" }}>{entry.task}</div>
                          <div style={{ fontSize:11, color:"#aaa", marginTop:2 }}>{entry.category} · {entry.date} {entry.time}</div>
                        </div>
                        <button onClick={() => removeEntry(entry.id)} style={{ background:"none", border:"none", cursor:"pointer", color:"#ccc", fontSize:16, padding:"0 4px" }}>×</button>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}

          <div style={{ height:40 }} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
